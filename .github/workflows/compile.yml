name: Compile businesses.json

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile businesses.json
        run: node scripts/compile.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/businesses.json
          git diff --staged --quiet || git commit -m "chore: regenerate businesses.json [skip ci]"
          git push
